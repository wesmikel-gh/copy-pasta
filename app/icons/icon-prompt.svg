<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="amber-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.3"/>
  <!-- Terminal prompt: >_ -->
  <g filter="url(#amber-glow)">
    <text x="130" y="310" font-family="'Courier New', monospace" font-size="200" font-weight="bold" fill="#ff8800">
      &gt;_
    </text>
  </g>
  <!-- Subtle grid background -->
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="238"/>
    </clipPath>
  </defs>
  <g opacity="0.08" clip-path="url(#circle-clip)">
    <!-- Horizontal grid lines -->
    <line x1="16" y1="56" x2="496" y2="56" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="96" x2="496" y2="96" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="136" x2="496" y2="136" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="176" x2="496" y2="176" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="216" x2="496" y2="216" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="256" x2="496" y2="256" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="296" x2="496" y2="296" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="336" x2="496" y2="336" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="376" x2="496" y2="376" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="416" x2="496" y2="416" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="16" y1="456" x2="496" y2="456" stroke="#ff8800" stroke-width="0.75"/>
    <!-- Vertical grid lines -->
    <line x1="56" y1="16" x2="56" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="96" y1="16" x2="96" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="136" y1="16" x2="136" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="176" y1="16" x2="176" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="216" y1="16" x2="216" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="256" y1="16" x2="256" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="296" y1="16" x2="296" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="336" y1="16" x2="336" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="376" y1="16" x2="376" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="416" y1="16" x2="416" y2="496" stroke="#ff8800" stroke-width="0.75"/>
    <line x1="456" y1="16" x2="456" y2="496" stroke="#ff8800" stroke-width="0.75"/>
  </g>
</svg>
