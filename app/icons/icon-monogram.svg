<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="amber-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.3"/>
  <!-- CP Monogram -->
  <g filter="url(#amber-glow)">
    <!-- C -->
    <text x="100" y="340" font-family="'Courier New', monospace" font-size="240" font-weight="bold" fill="#ff8800" opacity="0.9">
      C
    </text>
    <!-- P overlapping -->
    <text x="248" y="340" font-family="'Courier New', monospace" font-size="240" font-weight="bold" fill="#ffaa00" opacity="0.8">
      P
    </text>
  </g>
  <!-- Subtle scanlines -->
  <g opacity="0.06">
    <line x1="40" y1="100" x2="472" y2="100" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="150" x2="472" y2="150" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="200" x2="472" y2="200" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="250" x2="472" y2="250" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="300" x2="472" y2="300" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="350" x2="472" y2="350" stroke="#ff8800" stroke-width="1"/>
    <line x1="40" y1="400" x2="472" y2="400" stroke="#ff8800" stroke-width="1"/>
  </g>
</svg>
